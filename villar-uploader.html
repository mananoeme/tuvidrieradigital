<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Villar Propiedades – Carga</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'DM Sans', Arial, sans-serif; background-color: #000; margin: 0; padding: 0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; width: 100vw; overflow-y: auto; }
        #splash { position:fixed; inset:0; z-index:99999; background:#0a0a0a; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:28px; transition:opacity 0.4s ease; }
        #splash.oculto { opacity:0; pointer-events:none; }
        .splash-title { font-size:22px; font-weight:900; color:#fff; letter-spacing:-0.5px; text-transform:uppercase; text-align:center; line-height:1.1; }
        .splash-title span { color:#7B1C2E; }
        .splash-sub { font-family:'DM Mono',monospace; font-size:9px; color:#555; letter-spacing:0.2em; text-transform:uppercase; }
        .pin-circles { display:flex; gap:12px; align-items:center; justify-content:center; }
        .pin-circle { width:18px; height:18px; border-radius:50%; border:2px solid #333; background:transparent; transition:background 0.15s, border-color 0.15s; }
        .pin-circle.filled { background:#fff; border-color:#fff; }
        .pin-circle.error  { background:#7B1C2E; border-color:#7B1C2E; }
        .pin-circle.ok     { background:#2e7d32; border-color:#2e7d32; }
        .splash-error { font-family:'DM Mono',monospace; font-size:10px; font-weight:500; color:#7B1C2E; letter-spacing:0.1em; text-transform:uppercase; min-height:16px; }
        .pin-keypad { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; width:240px; }
        .pin-key { background:#1a1a1a; color:#fff; border:1.5px solid #2a2a2a; border-radius:12px; padding:16px 0; font-size:20px; font-weight:700; cursor:pointer; text-align:center; transition:background 0.1s, transform 0.08s; user-select:none; -webkit-user-select:none; }
        .pin-key:active { background:#2e2e2e; transform:scale(0.93); }
        .pin-key.del   { font-size:16px; color:#888; }
        .pin-key.enter { background:#7B1C2E; border-color:#5a1422; font-size:12px; font-weight:900; letter-spacing:0.05em; }
        .pin-key.enter:active { background:#5a1422; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
        .shake { animation:shake 0.4s ease; }
        #app { display:none; width:100%; justify-content:center; }
        #app.visible { display:flex; }
        .card { background:#fff; min-height:100vh; width:100%; max-width:450px; padding:10px 12px; display:flex; flex-direction:column; position:relative; justify-content:flex-start; z-index:1; }
        /* ══ IMPORTADOR ══ */
        .import-box { background:#0a0a18; border-radius:12px; padding:14px; margin-bottom:10px; }
        .import-title { font-family:'DM Mono',monospace; font-size:9px; font-weight:500; color:#888; letter-spacing:0.25em; text-transform:uppercase; margin-bottom:8px; }
        .import-row { display:flex; gap:6px; align-items:stretch; }
        .import-box .import-row input { flex:1 !important; background:#1a1a2e !important; background-color:#1a1a2e !important; border:2px solid #333 !important; color:#fff !important; font-size:11px !important; font-weight:500 !important; padding:8px 10px !important; border-radius:8px !important; outline:none !important; margin-top:0 !important; }
        .import-row input::placeholder { color:#555; }
.import-row input:-webkit-autofill,
.import-row input:-webkit-autofill:hover,
.import-row input:-webkit-autofill:focus,
.import-row input:-webkit-autofill:active {
    -webkit-box-shadow:0 0 0 1000px #1a1a2e inset !important;
    box-shadow:0 0 0 1000px #1a1a2e inset !important;
    -webkit-text-fill-color:#fff !important;
    background-color:#1a1a2e !important;
    caret-color:#fff;
}
        .import-row input:focus { border-color:#7B1C2E !important; }
        .btn-import { flex-shrink:0; padding:8px 14px; background:#7B1C2E; color:#fff; border:none; border-radius:8px; font-size:10px; font-weight:900; cursor:pointer; text-transform:uppercase; letter-spacing:0.05em; white-space:nowrap; transition:background 0.15s; }
        .btn-import:active { background:#5a1422; }
        .btn-import:disabled { background:#444; cursor:not-allowed; }
        .import-status { font-family:'DM Mono',monospace; font-size:9px; color:#888; min-height:14px; margin-top:5px; letter-spacing:0.05em; }
        .import-status.ok  { color:#2e7d32; }
        .import-status.err { color:#e53935; }
        .import-status.loading { color:#f59e0b; }
        /* ══ FORM ══ */
        .header-top { display:flex; align-items:center; justify-content:space-between; border-bottom:3px solid #111; padding-bottom:6px; margin-bottom:6px; }
        .id-wrap { position:relative; width:155px; }
        #prop-id-input { width:100%; background:#f0f0f0; border:2px solid #ccc; font-size:13px; font-weight:900; color:#333; text-transform:uppercase; padding:4px 28px 4px 6px; border-radius:6px; outline:none; }
        #id-status { position:absolute; right:6px; top:50%; transform:translateY(-50%); font-size:14px; line-height:1; }
        #id-hint { font-size:9px; font-weight:700; margin-top:2px; text-transform:uppercase; letter-spacing:0.05em; min-height:12px; }
        h2 { margin:0; font-size:14px; font-weight:900; letter-spacing:-0.5px; text-transform:uppercase; color:#000; flex:1; text-align:right; }
        label { display:block; margin-top:1px; font-weight:900; font-size:9px; text-transform:uppercase; color:#444; }
        input, textarea, .btn-opt, .btn-mon { border:2px solid #ccc !important; }
        input, textarea { width:100%; padding:5px; margin-top:1px; border-radius:6px; font-size:13px; outline:none; background-color:#fff; text-align:left; font-weight:700; transition:background-color 0.2s; }
input:-webkit-autofill, textarea:-webkit-autofill { -webkit-box-shadow:0 0 0 1000px #fff inset !important; -webkit-text-fill-color:#000 !important; }
        .error-field { background-color:#fff0f2 !important; border-color:#ccc !important; }
        input:focus, textarea:focus { background-color:#fff !important; outline:none; }
        .row { display:flex; gap:4px; width:100%; align-items:stretch; margin-top:4px; }
        .section-gray { width:100%; background:#f4f4f4; padding:6px; border-radius:8px; border:1px solid #ddd; margin-top:4px; overflow:hidden; }
        .col-gray { flex:1; background:#f4f4f4; padding:5px; border-radius:8px; border:1px solid #ddd; display:flex; flex-direction:column; }
        .grid-numerico { display:flex; flex-direction:column; gap:4px; width:100%; margin-top:4px; }
        .grid-fila-1, .grid-fila-2 { display:flex; gap:4px; width:100%; align-items:stretch; }
        .col-moneda { flex:0 0 55px; }
        .col-precio { flex:2; min-width:80px; }
        .col-expensas { flex:1.5; min-width:70px; }
        .col-small { flex:1; min-width:80px; }
        .btn-group { display:flex; gap:2px; flex-wrap:nowrap; margin-top:2px; width:100%; }
        .btn-opt { flex:1; padding:10px 2px; background:#fff; border-radius:5px; cursor:pointer; font-size:9px; font-weight:900; text-align:center; color:#333; text-transform:uppercase; transition:background-color 0.2s; }
        .active-green { background:#2e7d32 !important; color:#fff !important; border-color:#1b5e20 !important; }
        .active-red { background:#7B1C2E !important; color:#fff !important; border-color:#5a1422 !important; }
        .disabled-btn { opacity:0.2; pointer-events:none; background:#eee !important; }
        .btn-destaque { flex:1; padding:10px 4px; background:#fff; border:2px solid #ccc !important; border-radius:5px; cursor:pointer; font-size:9px; font-weight:900; color:#333; text-transform:uppercase; text-align:center; transition:background-color 0.15s; }
        .btn-destaque.active-red { background:#7B1C2E !important; color:#fff !important; border-color:#5a1422 !important; }
        .destaque-counter { font-size:9px; font-weight:900; color:#999; text-align:right; margin-top:4px; letter-spacing:0.04em; }
        .destaque-counter span { color:#7B1C2E; }
        .moneda-stack { display:flex; flex-direction:column; gap:2px; width:100%; height:100%; justify-content:center; }
        .btn-mon { padding:0; font-size:9px; font-weight:900; border-radius:4px; cursor:pointer; background:#fff; flex:1; min-height:20px; }
        .btn-mon.active { background:#2e7d32; color:#fff; border-color:#1b5e20 !important; }
        .desc-container { position:relative; width:100%; }
        textarea#desc { min-height:75px; max-height:75px; resize:none; text-align:left; padding:6px; font-size:12px; line-height:1.2; border:2px solid #ccc !important; }
        .char-count { position:absolute; bottom:3px; right:6px; font-size:9px; font-weight:900; color:#999; }
        .upload-container { width:100%; background-color:#e0f2fe; border:2px dashed #0284c7; border-radius:8px; padding:12px; text-align:center; cursor:pointer; margin-top:4px; position:relative; overflow:hidden; transition:background-color 0.2s; }
        .upload-container span { color:#0369a1; font-weight:900; font-size:13px; text-transform:uppercase; position:relative; z-index:2; }
        .prog-bar { position:absolute; bottom:0; left:0; height:100%; background:rgba(2,132,199,0.4); width:0%; transition:width 0.3s; z-index:1; }
        /* ══ URL FOTOS ══ */
        .url-fotos-box { background:#f0f4ff; border:2px dashed #7B1C2E; border-radius:8px; padding:10px; margin-top:6px; }
        .url-fotos-title { font-family:'DM Mono',monospace; font-size:8px; font-weight:500; color:#7B1C2E; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:6px; }
        .url-foto-row { display:flex; gap:5px; align-items:center; margin-bottom:4px; }
        .url-foto-row input { flex:1; font-size:10px; padding:5px 7px; border-radius:6px; border:1.5px solid #ccc !important; background:#fff; color:#333; font-weight:500; }
        .url-foto-row input::placeholder { color:#aaa; font-size:9px; }
        .btn-url-add { background:#7B1C2E; color:#fff; border:none; border-radius:6px; padding:5px 10px; font-size:10px; font-weight:900; cursor:pointer; white-space:nowrap; }
        .btn-url-add:disabled { background:#ccc; cursor:not-allowed; }
        .url-fotos-hint { font-family:'DM Mono',monospace; font-size:8px; color:#999; margin-top:3px; }
        /* ══ PREVIEW ══ */
        #preview { display:flex; flex-wrap:nowrap; gap:5px; margin-top:8px; width:100%; height:70px; overflow:hidden; }
        .thumb-wrap { position:relative; width:18.5%; height:100%; flex-shrink:0; cursor:grab; transition:opacity 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1), box-shadow 0.3s ease; user-select:none; }
        .thumb-wrap:active { cursor:grabbing; }
        .thumb-wrap.dragging { opacity:0.4; transform:scale(0.92) rotate(-2deg); box-shadow:0 8px 20px rgba(0,0,0,0.25); z-index:20; }
        .thumb-wrap.drag-over { outline:2px solid #7B1C2E; outline-offset:2px; border-radius:6px; transform:scale(1.04); }
        .thumb-wrap:first-child::after { content:'1°'; position:absolute; bottom:3px; left:3px; background:#7B1C2E; color:#fff; font-size:7px; font-weight:900; padding:1px 4px; border-radius:3px; letter-spacing:0.05em; z-index:5; }
        .thumb { width:100%; height:100%; object-fit:cover; border-radius:6px; border:1px solid #ddd; pointer-events:none; }
        .btn-del { position:absolute; top:1px; right:1px; background:#7B1C2E; color:#fff; border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:bold; border:1.5px solid #fff; z-index:10; cursor:pointer; }
        .btn-row { display:flex; gap:8px; margin-top:15px; margin-bottom:20px; }
        .btn-prev { flex:1; padding:18px 8px; background:#888; color:#fff; border:none; border-radius:12px; font-size:11px; font-weight:900; cursor:pointer; text-transform:uppercase; text-align:center; white-space:nowrap; }
        .btn-pub { flex:3; padding:18px; background:#111; color:#fff; border:none; border-radius:12px; font-size:15px; font-weight:900; cursor:pointer; text-transform:uppercase; position:relative; overflow:hidden; transition:background 0.4s; }
        .btn-pub:disabled { background:#999; cursor:not-allowed; }
        .btn-pub-bar { position:absolute; top:0; left:0; height:100%; background:#2e7d32; width:0%; border-radius:12px; pointer-events:none; transition:width 0.3s ease; }
        .btn-pub-label { position:relative; z-index:2; }
        .toast-container { position:fixed; top:0; left:0; width:100vw; height:100vh; display:none; justify-content:center; align-items:center; z-index:9999; background:rgba(0,0,0,0.6); }
        .toast-box { background:#fff; color:#333; padding:20px; border-radius:20px; display:flex; flex-direction:column; align-items:center; gap:15px; width:80%; max-width:280px; text-align:center; border:4px solid #f5c6cb; box-shadow:0 4px 15px rgba(0,0,0,0.2); }
        .toast-txt { font-weight:900; font-size:14px; text-transform:uppercase; }
        .toast-btns { display:flex; gap:10px; width:100%; margin-top:5px; }
        .t-btn { flex:1; padding:12px; border-radius:10px; font-weight:900; font-size:12px; border:none; cursor:pointer; text-transform:uppercase; }
        .bloqueo-total { pointer-events:none; opacity:0.7; }
        #preview-modal { display:none; position:fixed; inset:0; z-index:99999; background:rgba(0,0,0,0.88); align-items:center; justify-content:center; padding:16px; }
        #preview-modal.open { display:flex; }
        #preview-modal-wrap { width:100%; max-width:420px; }
        #preview-modal-close { display:block; width:100%; margin-top:10px; padding:14px; background:#fff; border:none; border-radius:10px; font-weight:900; font-size:13px; text-transform:uppercase; cursor:pointer; }
        #preview-label { font-family:'DM Mono',monospace; font-size:9px; color:rgba(255,255,255,0.4); text-align:center; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:8px; }
        .pv-ficha { background:#fff; border-radius:16px; display:flex; flex-direction:column; box-shadow:0 4px 18px rgba(0,0,0,0.5); padding:7px; gap:7px; font-family:'DM Sans',sans-serif; }
        .pv-fila-top { display:flex; flex-direction:row; align-items:flex-start; gap:7px; height:140px; overflow:hidden; }
        .pv-foto-wrap { flex-shrink:0; height:100%; aspect-ratio:16/9; position:relative; background:linear-gradient(135deg,#d0cdc8,#b8b4ae); overflow:hidden; border-radius:10px; }
        .pv-foto-wrap img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; }
        .pv-foto-wrap .sin-foto { width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:#999; font-size:10px; font-weight:700; }
        .pv-etiquetas { position:absolute; top:6px; left:6px; display:flex; flex-direction:column; gap:3px; z-index:2; max-width:60%; }
        .pv-etiqueta { background:rgba(255,255,255,0.95); color:#7B1C2E; font-size:8px; font-weight:800; padding:2px 6px; border-radius:3px; text-transform:uppercase; letter-spacing:0.05em; }
        .pv-codigo { position:absolute; top:6px; right:6px; z-index:2; background:rgba(0,0,0,0.6); color:#fff; font-family:'DM Mono',monospace; font-size:9px; font-weight:500; letter-spacing:0.12em; padding:3px 7px; border-radius:4px; text-transform:uppercase; }
        .pv-datos { flex:1; min-width:0; height:100%; display:flex; flex-direction:column; justify-content:flex-start; align-items:flex-start; overflow:hidden; gap:2px; }
        .pv-tipo { font-family:'DM Mono',monospace; font-size:8px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:#888; }
        .pv-badge { display:inline-block; background:#7B1C2E; color:#fff; font-size:9px; font-weight:900; letter-spacing:0.1em; text-transform:uppercase; padding:2px 8px; border-radius:3px; }
        .pv-barrio { font-size:14px; font-weight:900; color:#111; text-transform:uppercase; letter-spacing:-0.02em; line-height:1.05; word-break:break-word; }
        .pv-direccion { font-size:8px; font-weight:500; color:#888; margin-top:1px; }
        .pv-precio-row { display:flex; align-items:baseline; gap:2px; flex-wrap:wrap; }
        .pv-precio-moneda { font-family:'DM Mono',monospace; font-size:9px; font-weight:500; color:#7B1C2E; }
        .pv-precio-monto { font-size:17px; font-weight:900; color:#7B1C2E; letter-spacing:-0.5px; line-height:1; }
        .pv-expensas { font-family:'DM Mono',monospace; font-size:8px; color:#888; }
        .pv-desc { font-size:8px; font-weight:700; color:#444; line-height:1.4; overflow:hidden; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; border-top:1px solid #EBEBEB; padding-top:3px; margin-top:2px; }
        .pv-specs-bar { flex-shrink:0; background:#F3F1EE; border-radius:10px; display:flex; align-items:center; height:46px; padding:0 4px; }
        .pv-spec { display:flex; align-items:center; gap:4px; flex:1; padding:0 4px; position:relative; }
        .pv-spec+.pv-spec::before { content:''; position:absolute; left:0; top:15%; bottom:15%; width:1.5px; background:#DEDAD5; }
        .pv-spec-icon { width:14px; height:14px; color:#888; flex-shrink:0; }
        .pv-spec-texts { display:flex; flex-direction:column; line-height:1.1; }
        .pv-spec-val { font-size:13px; font-weight:900; color:#111; white-space:nowrap; }
        .pv-spec-lbl { font-size:6px; font-weight:700; color:#888; text-transform:uppercase; letter-spacing:0.05em; }
    </style>
</head>
<body>

<div id="splash">
    <img src="https://static.tokkobroker.com/tfw_images/78_Villar%20Propiedades/Villar_Logo_PNG.png" style="width:180px;margin-bottom:4px;">
    <div class="splash-title">ACCESO<br><span>RESTRINGIDO</span></div>
    <div class="splash-sub">Ingresá tu PIN de 6 dígitos</div>
    <div class="pin-circles" id="pin-circles">
        <div class="pin-circle" id="pc0"></div><div class="pin-circle" id="pc1"></div>
        <div class="pin-circle" id="pc2"></div><div class="pin-circle" id="pc3"></div>
        <div class="pin-circle" id="pc4"></div><div class="pin-circle" id="pc5"></div>
    </div>
    <div class="splash-error" id="splash-error"></div>
    <div class="pin-keypad">
        <button class="pin-key" onclick="pinKey('1')">1</button><button class="pin-key" onclick="pinKey('2')">2</button><button class="pin-key" onclick="pinKey('3')">3</button>
        <button class="pin-key" onclick="pinKey('4')">4</button><button class="pin-key" onclick="pinKey('5')">5</button><button class="pin-key" onclick="pinKey('6')">6</button>
        <button class="pin-key" onclick="pinKey('7')">7</button><button class="pin-key" onclick="pinKey('8')">8</button><button class="pin-key" onclick="pinKey('9')">9</button>
        <button class="pin-key enter" onclick="pinEnter()">OK</button><button class="pin-key" onclick="pinKey('0')">0</button><button class="pin-key del" onclick="pinDel()">⌫</button>
    </div>
    <a href="cambiar-pin.html" style="font-family:'DM Mono',monospace;font-size:9px;color:#444;letter-spacing:0.12em;text-transform:uppercase;text-decoration:none;margin-top:8px;">Cambiar PIN</a>
</div>

<div id="app">
    <div id="preview-modal">
        <div id="preview-modal-wrap">
            <div id="preview-label">ASÍ SE VE EN LA VIDRIERA</div>
            <div id="preview-modal-inner"></div>
            <button id="preview-modal-close" onclick="cerrarPreview()">✕ CERRAR PREVIEW</button>
        </div>
    </div>

    <div class="card" id="form-card">

        <!-- ══ IMPORTADOR ══ -->
        <div class="import-box">
            <div class="import-title">⚡ IMPORTAR DESDE TOKKO / SITIO WEB</div>
            <div class="import-row">
                <input type="url" id="import-url"
                    placeholder="https://www.inmobiliariavillar.com.ar/p/XXXXXXX-..."
                    autocomplete="off" autocorrect="off" spellcheck="false"
                    onkeydown="if(event.key==='Enter'){event.preventDefault();importarDesdeUrl();}">
                <button class="btn-import" id="btn-import" onclick="importarDesdeUrl()">IMPORTAR</button>
            </div>
            <div class="import-status" id="import-status"></div>
        </div>

        <!-- ══ HEADER ══ -->
        <div class="header-top">
            <div>
                <div class="id-wrap">
                    <input type="text" id="prop-id-input" placeholder="ID PROP"
                        onfocus="this.classList.remove('error-field')"
                        oninput="blindarTexto(this); verificarId(this.value)">
                    <span id="id-status"></span>
                </div>
                <div id="id-hint" style="color:#999"></div>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
                <img src="https://static.tokkobroker.com/tfw_images/78_Villar%20Propiedades/Villar_Logo_PNG.png" alt="Villar" style="height:34px; width:auto;">
                <h2 style="text-align:left;">PROPIEDADES</h2>
            </div>
        </div>

        <div class="section-gray"><label>Tipo de Propiedad</label><div class="btn-group" id="group-tipo"><button type="button" class="btn-opt" onclick="sel('tipo','Departamento',this)">Departamento</button><button type="button" class="btn-opt" onclick="sel('tipo','Casa',this)">Casa</button><button type="button" class="btn-opt" onclick="sel('tipo','PH',this)">PH</button><button type="button" class="btn-opt" onclick="sel('tipo','Local',this)">Local</button><button type="button" class="btn-opt" onclick="sel('tipo','Lote',this)">Lote</button></div></div>
        <div class="section-gray"><label>Operación</label><div class="btn-group" id="group-operacion"><button type="button" class="btn-opt" onclick="selOperacion('Venta',this)">Venta</button><button type="button" class="btn-opt" onclick="selOperacion('Alquiler',this)">Alquiler</button><button type="button" class="btn-opt" onclick="selOperacion('Temporal',this)">Temporal</button></div></div>

        <div class="section-gray">
            <label>Destaques (Máximo 3)</label>

// ═══════════ IMPORTADOR TOKKO ═══════════
const TOKKO_TIPO={2:'Departamento',3:'Casa',13:'PH',1:'Lote',5:'Casa',6:'Lote'};
const TOKKO_OP={1:'Venta',2:'Alquiler',3:'Temporal','venta':'Venta','alquiler':'Alquiler','temporal':'Temporal','alquiler temporal':'Temporal'};
const TOKKO_MON={1:'USD',2:'ARS','usd':'USD','ars':'ARS','dolares':'USD','pesos':'ARS'};

function extraerIdDesdeUrl(url){
    const m=url.match(/\/p\/(\d+)[-\/]/)||url.match(/\/property\/(\d+)/);
    return m?m[1]:null;
}

async function importarDesdeUrl(){
    const urlInput=document.getElementById('import-url');
    const btnImport=document.getElementById('btn-import');
    const url=urlInput.value.trim();
    if(!url){setStatus('err','⚠ Pegá la URL de la propiedad');return;}
    const propId=extraerIdDesdeUrl(url);
    if(!propId){setStatus('err','⚠ No pude extraer el ID desde esa URL');return;}
    btnImport.disabled=true;
    setStatus('loading',`⏳ Importando propiedad #${propId}...`);
    try{
        const result=await tokkoProxy({propId});
        aplicarDatosTokko(result.data, propId);
        setStatus('ok',`✓ Importado — revisá y ajustá si hace falta`);
        urlInput.value='';
    }catch(err){
        const msg=err.message||'Error desconocido';
        if(msg.includes('API Key')||msg.includes('configurada'))
            setStatus('err','⚠ API Key de Tokko no configurada aún');
        else if(msg.includes('no encontrada'))
            setStatus('err',`⚠ Propiedad #${propId} no encontrada`);
        else
            setStatus('err','⚠ '+msg);
    }
    btnImport.disabled=false;
}

function setStatus(tipo,msg){const el=document.getElementById('import-status');el.textContent=msg;el.className='import-status '+tipo;}

function aplicarDatosTokko(d,tokkoId){
    const idInput=document.getElementById('prop-id-input');
    idInput.value=tokkoId; verificarId(tokkoId);
    const tipo=TOKKO_TIPO[d.type?.id]||'';
    if(tipo) clickBtn('group-tipo',tipo,b=>sel('tipo',tipo,b));
    if(d.operations&&d.operations.length>0){
        const opId=d.operations[0].operation_type;
        const opStr=TOKKO_OP[opId]||TOKKO_OP[String(opId).toLowerCase()]||(typeof opId==='string'?opId:'')||'';
        if(opStr) clickBtn('group-operacion',opStr,b=>selOperacion(opStr,b));
        const priceObj=d.operations[0].prices&&d.operations[0].prices[0];
        if(priceObj){
            const mon=TOKKO_MON[priceObj.currency]||TOKKO_MON[String(priceObj.currency).toLowerCase()]||(typeof priceObj.currency==='string'?priceObj.currency.toUpperCase():'USD');
            setMoneda(mon);
            const mEl=document.getElementById('monto');
            const prefix=mon==='USD'?'U$D ':'$ ';
            mEl.value=priceObj.price>0?prefix+new Intl.NumberFormat('de-DE').format(priceObj.price):prefix;
            mEl.classList.remove('error-field');
        }
    }
    if(d.expenses>0){document.getElementById('expensas').value='$ '+new Intl.NumberFormat('de-DE').format(d.expenses);}
    const amb=d.room_amount;
    if(amb){const ambStr=amb<=1?'Monoambiente':amb>=4?'4+':String(amb);const btnTxt=ambStr==='Monoambiente'?'M':ambStr;clickBtnTxt('group-ambientes',btnTxt,b=>selAmbiente(ambStr,b));}
   const dorm=(d.bedroom_amount!=null?d.bedroom_amount:d.suite_amount);
    if(dorm!=null){const s=dorm>=3?'3+':String(dorm);clickBtnTxt('group-dormis',s,b=>sel('dormis',s,b));}
    const ban=d.bathroom_amount;
    if(ban){const s=ban>=3?'3+':String(ban);clickBtnTxt('group-banos',s,b=>sel('banos',s,b));}
    const coch=d.parking_lot_amount;
    if(coch!=null){const s=coch===0?'No':coch>=2?'2+':'1';clickBtnTxt('group-cochera',s,b=>sel('cochera',s,b));}
    if(d.location) document.getElementById('barrio').value=d.location.name||'';
    if(d.address) document.getElementById('direccion').value=d.address;
    if(d.roofed_surface>0){document.getElementById('m2').value=String(Math.round(d.roofed_surface));document.getElementById('m2').classList.remove('error-field');}
    if(d.total_surface>0) document.getElementById('m2total').value=String(Math.round(d.total_surface));
    if(d.age>0) document.getElementById('antiguedad').value=String(d.age);
    if(d.description){
        const descEl=document.getElementById('desc');
        descEl.value=d.description.replace(/\s+/g,' ').trim().substring(0,250);
        descEl.classList.remove('error-field');
        actualizarContador(descEl);
    }
    if(d.photos&&d.photos.length>0){
        misFotos=[];
        d.photos.slice(0,5).forEach(f=>{if(f.image)misFotos.push({tipo:'url',data:f.image});});
        renderPreview();
    }
}

                <div class="pv-spec">${ICONS.antig}<div class="pv-spec-texts"><span class="pv-spec-val">${antigVal}</span><span class="pv-spec-lbl">Antg</span></div></div>
            </div>
        </div>`;
    document.getElementById('preview-modal').classList.add('open');
}
function cerrarPreview(){document.getElementById('preview-modal').classList.remove('open');}
document.getElementById('preview-modal').addEventListener('click',function(e){if(e.target===this)cerrarPreview();});
function blindarTexto(el){el.value=el.value.replace(/[<>"';{}\[\]\\|^]/g,'');}
function limitarCifras(el,max){el.value=el.value.replace(/\D/g,'').substring(0,max);}
async function verificarId(val){
    const hint=document.getElementById('id-hint'),icon=document.getElementById('id-status'),btn=document.getElementById('env');
    val=val.trim().toUpperCase();
    if(!val){hint.textContent='';icon.textContent='';idDisponible=null;btn.disabled=false;return;}
    clearTimeout(idTimer);
    icon.textContent='⏳';hint.textContent='Verificando...';hint.style.color='#999';
    idTimer=setTimeout(async()=>{
        try{
            const snap=await db.collection('propiedades').where('propId','==',val).get();
            if(snap.empty){icon.textContent='✅';hint.textContent='¡Disponible!';hint.style.color='#2e7d32';idDisponible=true;btn.disabled=false;}
            else{icon.textContent='❌';hint.textContent='Código ya existe';hint.style.color='#7B1C2E';idDisponible=false;btn.disabled=true;}
        }catch(e){icon.textContent='⚠️';hint.textContent='Error al verificar';hint.style.color='#f59e0b';idDisponible=null;btn.disabled=false;}
    },600);
}
function manejarPrecio(el){
    const maxDigits=datos.moneda==='USD'?6:7;
    let numbers=el.value.replace(/\D/g,'').substring(0,maxDigits);
    let prefix=datos.moneda==='USD'?'U$D ':'$ ';
    el.value=numbers===''?prefix:prefix+new Intl.NumberFormat('de-DE').format(numbers);
}
function manejarExpensas(el){
    let numbers=el.value.replace(/\D/g,'').substring(0,7);
    el.value=numbers===''?'$ ':'$ '+new Intl.NumberFormat('de-DE').format(numbers);
}
function setMoneda(m){
    datos.moneda=m;
    document.getElementById('btn-usd').classList.toggle('active',m==='USD');
    document.getElementById('btn-ars').classList.toggle('active',m==='ARS');
    manejarPrecio(document.getElementById('monto'));
}
function actualizarContador(el){document.getElementById('count-label').innerText=`${el.value.length}/250`;}
async function procesarImagenes(files){
    const slotsLibres=5-misFotos.length;
    if(slotsLibres<=0)return;
    const seleccionadas=Array.from(files).slice(0,slotsLibres);
    const bar=document.getElementById('p-bar'),txt=document.getElementById('txt-fotos');
    txt.innerText='PROCESANDO...';
    let i=0;
    for(let file of seleccionadas){const c=await comprimirImagen(file);misFotos.push({tipo:'blob',data:c});i++;bar.style.width=`${(i/seleccionadas.length)*100}%`;}
    setTimeout(()=>{bar.style.width='0%';},600);
    document.getElementById('file-input').value='';renderPreview();
}
function comprimirImagen(file){
    return new Promise(resolve=>{
        const reader=new FileReader();reader.readAsDataURL(file);
        reader.onload=e=>{
            const img=new Image();img.src=e.target.result;
            img.onload=()=>{
                const canvas=document.createElement('canvas');
                let w=img.width,h=img.height,max=800;
                if(w>h&&w>max){h*=max/w;w=max;}else if(h>max){w*=max/h;h=max;}
                canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);
                canvas.toBlob(blob=>resolve(blob),'image/jpeg',0.7);
            };
        };
    });
}
function renderPreview(ordenAnterior,fotoMovida){
    const container=document.getElementById('preview');

    // Liberar blob URLs de la renderización anterior antes de crear nuevas
    blobUrlsActivas.forEach(u=>URL.revokeObjectURL(u));
    blobUrlsActivas=[];

    // FLIP: capturar posiciones actuales antes de reordenar, emparejando por identidad real de la foto
    const prevOrder=ordenAnterior||misFotos;
    const prevPositions=new Map();
    Array.from(container.children).forEach((el,i)=>{
        const f=prevOrder[i];
        if(f!==undefined) prevPositions.set(f,el.getBoundingClientRect());
    });

    const nuevo=container.cloneNode(false);
    container.parentNode.replaceChild(nuevo,container);
    nuevo.id='preview';

    misFotos.forEach((f,i)=>{
        const url=f.tipo==='url'?f.data:URL.createObjectURL(f.data);
        if(f.tipo!=='url') blobUrlsActivas.push(url);
        const wrap=document.createElement('div');
        wrap.className='thumb-wrap';
        wrap.draggable=true;
        wrap.dataset.idx=i;

        const img=document.createElement('img');img.src=url;img.className='thumb';
        const btn=document.createElement('div');btn.className='btn-del';btn.textContent='×';
        btn.onclick=(e)=>{e.stopPropagation();pedirConfirmacion(i);};

        wrap.appendChild(img);wrap.appendChild(btn);nuevo.appendChild(wrap);

        // Drag events
        wrap.addEventListener('dragstart',e=>{
            e.dataTransfer.effectAllowed='move';
            e.dataTransfer.setData('text/plain',i);
            setTimeout(()=>wrap.classList.add('dragging'),0);
        });
        wrap.addEventListener('dragend',()=>{
            wrap.classList.remove('dragging');
            nuevo.querySelectorAll('.thumb-wrap').forEach(t=>t.classList.remove('dragging','drag-over'));
        });
        wrap.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';wrap.classList.add('drag-over');});
        wrap.addEventListener('dragleave',()=>wrap.classList.remove('drag-over'));
        wrap.addEventListener('drop',e=>{
            e.preventDefault();
            const from=parseInt(e.dataTransfer.getData('text/plain'));
            const to=parseInt(wrap.dataset.idx);
            nuevo.querySelectorAll('.thumb-wrap').forEach(t=>t.classList.remove('dragging','drag-over'));
            if(from===to) return;
            const ordenAnterior=misFotos.slice();
            const [moved]=misFotos.splice(from,1);
            misFotos.splice(to,0,moved);
            renderPreview(ordenAnterior,moved);
        });
    });

    actualizarHintFotos();
    actualizarBtnUrlAdd();

    // FLIP: animar desde la posición vieja a la nueva
    if(prevPositions.size){
        const elementos=Array.from(nuevo.children);
        elementos.forEach((el,i)=>{
            const prev=prevPositions.get(misFotos[i]);
            if(!prev) return;
            const next=el.getBoundingClientRect();
            const dx=prev.left-next.left;
            if(Math.abs(dx)<1) return;
            el.style.transition='none';
            el.style.transform=`translateX(${dx}px)`;
        });
        const movedIdx=fotoMovida?misFotos.indexOf(fotoMovida):-1;
        const movedEl=movedIdx>=0?elementos[movedIdx]:null;
        if(movedEl) movedEl.style.zIndex='30';
        // Forzar reflow para que el navegador registre la posición inicial
        void nuevo.offsetHeight;
        elementos.forEach(el=>{
            el.style.transition='transform 0.5s cubic-bezier(0.22, 0.9, 0.3, 1)';
            el.style.transform='translateX(0)';
            el.addEventListener('transitionend',()=>{el.style.transition='';el.style.transform='';el.style.zIndex='';},{once:true});
        });
    }
}
function sel(campo,valor,el){Array.from(el.parentElement.querySelectorAll('.btn-opt')).forEach(b=>b.classList.remove('active-green','error-field'));el.classList.add('active-green');datos[campo]=valor;}
function selOperacion(v,el){sel('operacion',v,el);setMoneda(v==='Venta'?'USD':'ARS');}
function selAmbiente(v,el){
    const group=document.getElementById('group-ambientes');
    Array.from(group.querySelectorAll('.btn-opt')).forEach(b=>b.classList.remove('active-green','error-field'));
    if(el&&el.classList)el.classList.add('active-green');
    datos.ambientes=v;
    const dg=document.getElementById('group-dormis');
    if(v==='Monoambiente'){datos.dormis='0';Array.from(dg.querySelectorAll('.btn-opt')).forEach(b=>{b.classList.remove('active-green');b.classList.add('disabled-btn');});}
    else{Array.from(dg.querySelectorAll('.btn-opt')).forEach(b=>b.classList.remove('disabled-btn'));}
}
function pedirConfirmacion(i){indexABorrar=i;abrirToast('toast-confirm');}
function confirmarBorrado(){
    if(indexABorrar!==null){misFotos.splice(indexABorrar,1);renderPreview();}
    cerrarToast();
}
function abrirToast(id){document.getElementById('toast-wrapper').style.display='flex';document.getElementById(id).style.display='flex';}
function cerrarToast(e){if(e&&e.target!==document.getElementById('toast-wrapper'))return;document.getElementById('toast-wrapper').style.display='none';['toast-confirm','toast-error','toast-success'].forEach(id=>document.getElementById(id).style.display='none');}
async function subir(){
    if(document.getElementById('form-card').classList.contains('bloqueo-total'))return;
    if(idDisponible===false){document.getElementById('error-msg').textContent='ESE CÓDIGO YA EXISTE';abrirToast('toast-error');return;}
    let error=false;
    const pInput=document.getElementById('monto'),rawM=pInput.value.replace(/\D/g,'');
    if(!rawM){pInput.classList.add('error-field');error=true;}
    ['prop-id-input','barrio','m2','desc'].forEach(id=>{const el=document.getElementById(id);if(!el.value.trim()){el.classList.add('error-field');error=true;}});
    const grupos=[{val:datos.tipo,id:'group-tipo'},{val:datos.operacion,id:'group-operacion'},{val:datos.ambientes,id:'group-ambientes'},{val:datos.banos,id:'group-banos'},{val:datos.cochera,id:'group-cochera'}];
    if(datos.ambientes!=='Monoambiente')grupos.push({val:datos.dormis,id:'group-dormis'});
    grupos.forEach(g=>{if(!g.val){Array.from(document.getElementById(g.id).querySelectorAll('.btn-opt')).forEach(b=>b.classList.add('error-field'));error=true;}});
    if(misFotos.length===0){document.getElementById('drop-zone').classList.add('error-field');error=true;}
    if(error){abrirToast('toast-error');return;}
    const propId=document.getElementById('prop-id-input').value.trim().toUpperCase();
    const snapFinal=await db.collection('propiedades').where('propId','==',propId).get();
    if(!snapFinal.empty){document.getElementById('error-msg').textContent='ESE CÓDIGO YA EXISTE';abrirToast('toast-error');return;}
    document.getElementById('form-card').classList.add('bloqueo-total');
    const pubBar=document.getElementById('pub-bar'),pubLabel=document.getElementById('pub-label');
    pubLabel.textContent='PUBLICANDO...';
    let pct=0;
    const barTimer=setInterval(()=>{pct=Math.min(pct+Math.random()*10,88);pubBar.style.width=pct+'%';},300);
    try{
        const promesas=misFotos.map((f,i)=>{
            if(f.tipo==='url')return Promise.resolve(f.data);
            const ref=st.ref().child(`propiedades/${propId}/${Date.now()}_${i}.jpg`);
            return ref.put(f.data).then(snap=>snap.ref.getDownloadURL());
        });
        const urls=await Promise.all(promesas);
        await db.collection('propiedades').add({
            propId,operacion:datos.operacion,tipo:datos.tipo,etiquetas:datos.etiquetas,moneda:datos.moneda,
            ambientes:datos.ambientes,dormis:datos.dormis,banos:datos.banos,cochera:datos.cochera,
            antiguedad:document.getElementById('antiguedad').value||'0',
            barrio:document.getElementById('barrio').value.trim(),
            direccion:document.getElementById('direccion').value.trim()||'',
            monto:Number(rawM),
            expensas:Number(document.getElementById('expensas').value.replace(/\D/g,'')||0),
            m2:Number(document.getElementById('m2').value),
            m2total:Number(document.getElementById('m2total').value||0),
            descripcion:document.getElementById('desc').value.trim(),
            fotos:urls,status:'active',
            timestamp:firebase.firestore.FieldValue.serverTimestamp()
        });
        clearInterval(barTimer);pubBar.style.transition='width 0.4s ease';pubBar.style.width='100%';
        pubLabel.textContent='✓ PUBLICADO';
        setTimeout(()=>abrirToast('toast-success'),500);
        setTimeout(()=>location.reload(),2500);
    }catch(e){
        clearInterval(barTimer);pubBar.style.width='0%';
        document.getElementById('form-card').classList.remove('bloqueo-total');
        pubLabel.textContent='ERROR - REINTENTAR';
    }
}
</script>
